name: Directory Sync Labels (Exact)

on:
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Configure tokens
        run: |
          echo "GITHUB_TOKEN=${{ steps.app_token.outputs.token }}" >> $GITHUB_ENV
          echo "READ_TOKEN=${{ secrets.GH_TOKEN }}" >> $GITHUB_ENV
      - name: Sync labels to exact partner set
        run: bash .github/scripts/sync-labels.sh

