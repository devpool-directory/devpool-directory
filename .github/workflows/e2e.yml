name: E2E

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install
        run: npm ci || npm install

      - name: Build (typecheck)
        run: npm run build --silent --if-present

      - name: Prepare E2E config
        run: |
          mkdir -p config
          cat > config/e2e.config.json <<'JSON'
          {
            "include": ["devpool-directory/devpool-directory-testing"],
            "exclude": [],
            "explicit_urls": [],
            "categories": {},
            "official_owners": ["devpool-directory"],
            "data_branch": "__STORAGE__",
            "max_shards": 1
          }
          JSON

      - name: Plan (K=1)
        run: npm run plan > plan.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG_PATH: ./config/e2e.config.json

      - name: Run shard 0 (DRY_RUN)
        run: npm run sync:shard -- --shard 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIRECTORY_OWNER: devpool-directory
          DIRECTORY_REPO: devpool-directory-testing
          CONFIG_PATH: ./config/e2e.config.json
          DRY_RUN: "true"

      - name: Upload shard outputs
        uses: actions/upload-artifact@v4
        with:
          name: shard-0
          path: out/shard-0-*.json
          if-no-files-found: warn

      - name: Aggregate (DRY_RUN)
        run: npm run aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIRECTORY_OWNER: devpool-directory
          DIRECTORY_REPO: devpool-directory-testing
          DATA_BRANCH: __STORAGE__
          DRY_RUN: "true"

      - name: Upload aggregated outputs
        uses: actions/upload-artifact@v4
        with:
          name: out-agg
          path: out-agg/*.json
          if-no-files-found: warn
