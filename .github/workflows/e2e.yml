name: E2E

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Get GitHub App token
        id: get_installation_token
        uses: tibdex/github-app-token@v1.7.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Install
        run: npm ci --include=dev || npm install

      - name: Build (typecheck)
        run: |
          npx tsc -v || true
          npm run build --silent --if-present
          ls -la || true
          ls -la src || true
          ls -la dist || true

      - name: Prepare E2E config
        run: |
          mkdir -p config
          cat > config/e2e.config.json <<'JSON'
          {
            "include": ["devpool-directory/devpool-directory-testing"],
            "exclude": [],
            "explicit_urls": [],
            "categories": {},
            "official_owners": ["devpool-directory"],
            "data_branch": "__STORAGE__",
            "max_shards": 1
          }
          JSON

      - name: Plan (K=1)
        run: |
          npm run build --silent --if-present
          ls -la dist || true
          npm run plan > plan.json
        env:
          GITHUB_TOKEN: ${{ steps.get_installation_token.outputs.token }}
          CONFIG_PATH: ./config/e2e.config.json

      - name: Create partner test issue
        id: create_issue
        env:
          GH_TOKEN: ${{ steps.get_installation_token.outputs.token }}
        run: |
          TITLE="[E2E] Sample task $(date +%s)"
          BODY=$'Implement a small change for E2E validation.\n\nAcceptance criteria:\n- trivial content\n- safe to mirror\n'
          RESP=$(gh api repos/devpool-directory/devpool-directory-testing/issues -f title="$TITLE" -f body="$BODY")
          echo "$RESP" | jq -r '.html_url,.number' | paste -sd' ' - | awk '{print "url=" $1 "\nnumber=" $2}' >> $GITHUB_OUTPUT

      - name: Run shard 0
        run: |
          npm run build --silent --if-present
          npm run sync:shard -- --shard 0
        env:
          GITHUB_TOKEN: ${{ steps.get_installation_token.outputs.token }}
          DIRECTORY_OWNER: devpool-directory
          DIRECTORY_REPO: devpool-directory-testing
          CONFIG_PATH: ./config/e2e.config.json

      - name: Upload shard outputs
        uses: actions/upload-artifact@v4
        with:
          name: shard-0
          path: out/shard-0-*.json
          if-no-files-found: warn

      - name: Aggregate
        run: |
          npm run build --silent --if-present
          npm run aggregate
        env:
          GITHUB_TOKEN: ${{ steps.get_installation_token.outputs.token }}
          DIRECTORY_OWNER: devpool-directory
          DIRECTORY_REPO: devpool-directory-testing
          DATA_BRANCH: __STORAGE__

      - name: Upload aggregated outputs
        uses: actions/upload-artifact@v4
        with:
          name: out-agg
          path: out-agg/*.json
          if-no-files-found: warn

      - name: Find and close mirrored directory issue (cleanup)
        if: always()
        env:
          GH_TOKEN: ${{ steps.get_installation_token.outputs.token }}
        run: |
          # Close the partner test issue (if created)
          if [ -n "${{ steps.create_issue.outputs.number }}" ]; then
            gh issue close ${{ steps.create_issue.outputs.number }} -R devpool-directory/devpool-directory-testing || true
          fi
          # Find mirror (body matches partner URL)
          MIRROR_NUM=$(gh issue list -R devpool-directory/devpool-directory-testing --state open --json number,body | jq -r '.[] | select(.body == "'${{ steps.create_issue.outputs.url }}'") | .number' | head -n1)
          if [ -n "$MIRROR_NUM" ]; then
            gh issue close "$MIRROR_NUM" -R devpool-directory/devpool-directory-testing || true
          fi
