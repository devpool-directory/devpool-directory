name: E2E (Testing Repo)

on:
  workflow_dispatch:
    inputs:
      directory_repo:
        description: "Target directory repo for mirror writes"
        default: "devpool-directory-testing"
        required: true

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Node is preinstalled; run bundled scripts directly

      - name: Write E2E config (focused)
        run: |
          mkdir -p config
          cat > config/e2e.config.json <<'JSON'
          {"include":["devpool-directory/devpool-directory-tasks"],"exclude":[],"explicit_urls":[],"categories":{},"official_owners":["devpool-directory"],"data_branch":"__STORAGE__","max_shards":1}
          JSON
        env:
          CONFIG_PATH: config/e2e.config.json

      - name: Generate plan (K=1)
        run: node dist/bin/plan.js > plan.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CONFIG_PATH: config/e2e.config.json

      - name: Create GitHub App token (testing repo)
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.inputs.directory_repo }}

      - name: Run shard 0 against testing repo
        run: node dist/bin/sync-shard.js --shard 0
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          DIRECTORY_OWNER: ${{ github.repository_owner }}
          DIRECTORY_REPO: ${{ github.event.inputs.directory_repo }}
          WRITE_TARGET_REPO: ${{ github.repository_owner }}/${{ github.event.inputs.directory_repo }}
          CONFIG_PATH: config/e2e.config.json
          TWEET_ON_CREATE: "true"
          DELETE_TWEET_ON_COMPLETE: "true"
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_KEY_SECRET: ${{ secrets.TWITTER_API_KEY_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-shard
          path: out/*.json
          if-no-files-found: ignore

      - name: Aggregate & write artifacts to testing repo
        run: node dist/bin/aggregate.js
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          DIRECTORY_OWNER: ${{ github.repository_owner }}
          DIRECTORY_REPO: ${{ github.event.inputs.directory_repo }}
          DATA_BRANCH: __STORAGE__

      - name: Summary
        run: node dist/bin/summary.js >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DIRECTORY_OWNER: ${{ github.repository_owner }}
          DIRECTORY_REPO: ${{ github.event.inputs.directory_repo }}
          DATA_BRANCH: __STORAGE__
