name: Cleanup Unauthorized Mirrors

on:
  workflow_dispatch:
    inputs:
      owner:
        description: Target owner
        default: devpool-directory
      repo:
        description: Target repo
        default: devpool-directory
      dry_run:
        description: Preview only (no deletions)
        type: choice
        options: ["false", "true"]
        default: "false"

permissions:
  issues: write
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all non-App authored mirrors
        env:
          OWNER: ${{ inputs.owner }}
          REPO: ${{ inputs.repo }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          ALLOWED_1: devpool-directory-superintendent
          ALLOWED_2: devpool-directory-superintendent[bot]
        run: |
          set -euo pipefail
          : > del.tsv
          CURSOR=""
          while : ; do
            if [ -z "$CURSOR" ]; then
              RESP=$(gh api graphql -f query='query($owner:String!,$name:String!){ repository(owner:$owner,name:$name){ issues(first:100, states:[OPEN,CLOSED]){ nodes{ id number url body author{ login } } pageInfo{ hasNextPage endCursor } } } }' -f owner="$OWNER" -f name="$REPO")
            else
              RESP=$(gh api graphql -f query='query($owner:String!,$name:String!,$cursor:String!){ repository(owner:$owner,name:$name){ issues(first:100, after:$cursor, states:[OPEN,CLOSED]){ nodes{ id number url body author{ login } } pageInfo{ hasNextPage endCursor } } } }' -f owner="$OWNER" -f name="$REPO" -f cursor="$CURSOR")
            fi
            echo "$RESP" | jq -r --arg A1 "$ALLOWED_1" --arg A2 "$ALLOWED_2" '
              .data.repository.issues.nodes[] | select((.author.login != $A1) and (.author.login != $A2))
              | select((.body // "") | test("^https://(www\\.)?github\\.com/[^/]+/[^/]+/issues/[0-9]+$"))
              | [.number, .id, .author.login, .body] | @tsv' >> del.tsv
            HAS_NEXT=$(echo "$RESP" | jq -r '.data.repository.issues.pageInfo.hasNextPage')
            CURSOR=$(echo "$RESP" | jq -r '.data.repository.issues.pageInfo.endCursor')
            [ "$HAS_NEXT" = "true" ] || break
            sleep 0.05
          done

          TOTAL=$(wc -l < del.tsv | tr -d ' ')
          echo "Total unauthorized mirrors: $TOTAL"
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run; not deleting."
            exit 0
          fi
          N=0
          while IFS=$'\t' read -r NUM ID AUTHOR BODY; do
            [ -z "$ID" ] && continue
            if gh api graphql -f query='mutation($id:ID!){ deleteIssue(input:{issueId:$id}){ clientMutationId } }' -F id="$ID" >/dev/null 2>&1; then
              echo "Deleted #$NUM by $AUTHOR"
            else
              gh api graphql -f query='mutation($id:ID!){ closeIssue(input:{issueId:$id}){ issue{ number state } } }' -F id="$ID" >/dev/null 2>&1 || true
              echo "Closed #$NUM by $AUTHOR"
            fi
            N=$((N+1))
            # gentle pacing to avoid secondary limits
            sleep 0.06
          done < del.tsv
          echo "Done. Deleted/closed $N entries."

