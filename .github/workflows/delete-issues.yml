name: Delete Specific Issues (App)

on:
  workflow_dispatch:
    inputs:
      numbers:
        description: Comma-separated issue numbers to delete (hard delete)
        required: true

permissions:
  issues: write
  contents: read

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install deps
        run: |
          npm ci || npm i --no-audit --no-fund
      - name: Create GitHub App token (repo)
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Hard delete listed issues via App token
        run: npx tsx src/cli/delete-issues.ts
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          DIRECTORY_OWNER: ${{ github.repository_owner }}
          DIRECTORY_REPO: ${{ github.event.repository.name }}
          WRITE_TARGET_REPO: ${{ github.repository_owner }}/${{ github.event.repository.name }}
          NUMBERS: ${{ inputs.numbers }}
      - name: Verify and force delete via gh api (fallback)
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          NUMBERS: ${{ inputs.numbers }}
        run: |
          set -euo pipefail
          IFS=',' read -ra ARR <<< "$NUMBERS"
          for n in "${ARR[@]}"; do
            n=$(echo "$n" | xargs)
            [ -z "$n" ] && continue
            nid=$(gh api repos/$OWNER/$REPO/issues/$n -q .node_id 2>/dev/null || echo "")
            if [ -n "$nid" ]; then
              gh api graphql -f query='mutation($id:ID!){ deleteIssue(input:{issueId:$id}){ clientMutationId } }' -F id="$nid" || true
            fi
          done
