name: Deduplicate Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no issues will be deleted)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  deduplicate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run deduplication script
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          DEVPOOL_GITHUB_API_TOKEN: ${{ secrets.GH_TOKEN }}
          DEVPOOL_OWNER_NAME: ${{ github.repository_owner }}
          DEVPOOL_REPO_NAME: devpool-directory
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Running in dry-run mode..."
            bun run deduplicate:dry
          else
            echo "Running deduplication (will delete duplicate issues)..."
            bun run deduplicate
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Deduplication Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry Run: ${{ github.event.inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for detailed results." >> $GITHUB_STEP_SUMMARY
