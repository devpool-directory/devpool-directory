name: Twitter Sync

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply changes (create/delete tweets)'
        required: false
        default: 'false'
      create_budget:
        description: 'Create budget per run'
        required: false
        default: '5'
      delete_budget:
        description: 'Delete budget per run'
        required: false
        default: '50'
      include_assigned:
        description: 'Include assigned issues in desired set'
        required: false
        default: 'false'
      max_scan:
        description: 'Max tweets to scan'
        required: false
        default: '1000'

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Plan Twitter Sync
        env:
          DEVPOOL_OWNER_NAME: ${{ github.repository_owner }}
          DEVPOOL_REPO_NAME: ${{ github.event.repository.name }}
          MAX_TWEETS_SCAN: ${{ inputs.max_scan }}
          INCLUDE_ASSIGNED: ${{ inputs.include_assigned }}
        run: npm run twitter:plan
      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twitter-plan
          path: |
            twitter-plan.json
            twitter-current.json

  apply:
    if: ${{ inputs.apply == 'true' }}
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Apply Twitter Sync
        env:
          DEVPOOL_OWNER_NAME: ${{ github.repository_owner }}
          DEVPOOL_REPO_NAME: ${{ github.event.repository.name }}
          TWEET_BUDGET_CREATE: ${{ inputs.create_budget }}
          TWEET_BUDGET_DELETE: ${{ inputs.delete_budget }}
          DRY_RUN: 'false'
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_KEY_SECRET: ${{ secrets.TWITTER_API_KEY_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: npm run twitter:apply
      - name: Upload delta artifact
        uses: actions/upload-artifact@v4
        with:
          name: twitter-delta
          path: |
            twitter-delta.json
