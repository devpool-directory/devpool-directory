name: Mirror Cleanup

on:
  workflow_dispatch:
    inputs:
      owner:
        description: Target owner
        default: devpool-directory
      repo:
        description: Target repo
        default: devpool-directory

permissions:
  issues: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Build bundled binaries
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm run bundle:all
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner }}
          repositories: ${{ inputs.repo }}
      - name: Run mirror cleanup (delete invalid, dedupe, state/label sync)
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DIRECTORY_OWNER: ${{ inputs.owner }}
          DIRECTORY_REPO: ${{ inputs.repo }}
        run: node dist/bin/cleanup.cjs

