name: Matrix Sync

on:
  # schedule:
    # - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      full_resync:
        description: "Ignore since; full fetch"
        type: choice
        options: ["false", "true"]
        default: "false"

permissions:
  contents: write
  issues: write
  actions: read

# Avoid auto-cancelling manual runs; allow overlapping while we test
concurrency:
  group: directory-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix_include: ${{ steps.out.outputs.matrix_include }}
      matrix_json: ${{ steps.out.outputs.matrix_json }}
      shards_list: ${{ steps.out.outputs.shards_list }}
      max_parallel: ${{ steps.out.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@v4
      # Ensure Node is available, then run bundled scripts directly
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Generate plan
        run: |
          node dist/bin/plan.cjs > plan.json
        env:
          # Use default Actions token for read-only planning (avoids PAT scope mismatches)
          GITHUB_TOKEN: ${{ github.token }}
      - name: Fetch prior artifacts from data branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh api repos/${{ github.repository }}/contents/index.json?ref=__STORAGE__ --jq '.content' | base64 -d > index.json || true
          gh api repos/${{ github.repository }}/contents/twitter-map.json?ref=__STORAGE__ --jq '.content' | base64 -d > twitter-map.json || true
          gh api repos/${{ github.repository }}/contents/sync-metadata.json?ref=__STORAGE__ --jq '.content' | base64 -d > sync-metadata.json || true
          gh api repos/${{ github.repository }}/contents/issues-map.json?ref=__STORAGE__ --jq '.content' | base64 -d > issues-map.json || true
          gh api repos/${{ github.repository }}/contents/lifetime-map.json?ref=__STORAGE__ --jq '.content' | base64 -d > lifetime-map.json || true
      - id: out
        run: |
          echo "matrix_include=$(jq -c .matrix.include plan.json)" >> $GITHUB_OUTPUT
          echo "shards_list=$(jq -c '.matrix.include | map(.shard_id)' plan.json)" >> $GITHUB_OUTPUT
          echo "matrix_json=$(jq -c .matrix plan.json)" >> $GITHUB_OUTPUT
          echo "max_parallel=$(jq -r .maxParallel plan.json)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: plan
          path: |
            plan.json
            plan-summary.json
      - uses: actions/upload-artifact@v4
        with:
          name: plan-extra
          path: |
            index.json
            twitter-map.json
            sync-metadata.json

  sync-shard:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix_json) }}
      # Drive parallelism from plan (caps at OSS default 256)
      max-parallel: ${{ fromJson(needs.plan.outputs.max_parallel) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      # Ensure Node is available; no dependency install required for bundled scripts
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Create GitHub App token (repo)
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - uses: actions/download-artifact@v4
        with: { name: plan }
      - uses: actions/download-artifact@v4
        with: { name: plan-extra }
      - name: Run shard (with timeout)
        run: |
          # Gracefully abort a shard if it stalls (exit 124)
          timeout ${SHARD_TIMEOUT_MINUTES:-12}m node dist/bin/sync-shard.cjs --shard ${{ matrix.shard_id }}
        env:
          # Use GitHub App token so mirrors are authored by the App
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DIRECTORY_OWNER: ${{ github.repository_owner }}
          DIRECTORY_REPO: ${{ github.event.repository.name }}
          WRITE_TARGET_REPO: ${{ github.repository_owner }}/${{ github.event.repository.name }}
          FULL_RESYNC: ${{ inputs.full_resync }}
          USE_GRAPHQL: "true"
          TWEET_ON_CREATE: "true"
          DELETE_TWEET_ON_COMPLETE: "true"
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_KEY_SECRET: ${{ secrets.TWITTER_API_KEY_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard_id }}
          path: out/shard-${{ matrix.shard_id }}-*.json
          if-no-files-found: ignore

  aggregate:
    needs: [plan, sync-shard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Ensure Node is available; no dependency install required for bundled scripts
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/download-artifact@v4
        with: { path: ./shards }
      - name: Create GitHub App token (repo)
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Aggregate & write artifacts
        run: node dist/bin/aggregate.cjs
        env:
          # Prefer PAT for repo contents writes; fallback is App token
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          DIRECTORY_OWNER: ${{ github.repository_owner }}
          DIRECTORY_REPO: ${{ github.event.repository.name }}
          DATA_BRANCH: __STORAGE__

  summary:
    needs: aggregate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Ensure Node is available; no dependency install required for bundled scripts
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node dist/bin/summary.cjs >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DIRECTORY_OWNER: ${{ github.repository_owner }}
          DIRECTORY_REPO: ${{ github.event.repository.name }}
          DATA_BRANCH: __STORAGE__

  debug-matrix:
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "matrix_include: ${{ needs.plan.outputs.matrix_include }}"
          echo "matrix_json:   ${{ needs.plan.outputs.matrix_json }}"
          echo "max_parallel:  ${{ needs.plan.outputs.max_parallel }}"
          echo "shards_list:   ${{ needs.plan.outputs.shards_list }}"
