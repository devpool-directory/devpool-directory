name: Matrix Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: directory-sync
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix_include: ${{ steps.out.outputs.matrix_include }}
      shards_json: ${{ steps.out.outputs.shards_json }}
      max_parallel: ${{ steps.out.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --include=dev || npm install
      - run: npm run build --silent --if-present
      - name: Generate plan
        run: |
          npm run build --silent --if-present
          node dist/cli/plan.js > plan.json
        env:
          # Use default Actions token for read-only planning (avoids PAT scope mismatches)
          GITHUB_TOKEN: ${{ github.token }}
      - id: out
        run: |
          echo "matrix_include=$(jq -c .matrix.include plan.json)" >> $GITHUB_OUTPUT
          echo "shards_json=$(jq -c '.matrix.include | map({shard_id: .shard_id})' plan.json)" >> $GITHUB_OUTPUT
          echo "max_parallel=$(jq -r .maxParallel plan.json)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: plan
          path: plan.json

  sync-shard:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.plan.outputs.shards_json) }}
      max-parallel: ${{ needs.plan.outputs.max_parallel }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --include=dev || npm install
      - run: npm run build --silent --if-present
      - uses: actions/download-artifact@v4
        with: { name: plan }
      - name: Run shard
        run: npm run sync:shard -- --shard ${{ matrix.shard_id }}
        env:
          # Default token is fine for reads/labels; aggregator uses PAT for writes
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TWEET_ON_CREATE: "true"
          DELETE_TWEET_ON_COMPLETE: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard_id }}
          path: out/shard-${{ matrix.shard_id }}-*.json
          if-no-files-found: ignore

  aggregate:
    needs: [plan, sync-shard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --include=dev || npm install
      - run: npm run build --silent --if-present
      - uses: actions/download-artifact@v4
        with: { path: ./shards }
      - name: Aggregate & write artifacts
        run: npm run aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          DIRECTORY_OWNER: ${{ github.repository_owner }}
          DIRECTORY_REPO: ${{ github.event.repository.name }}
          DATA_BRANCH: __STORAGE__

  summary:
    needs: aggregate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm run summary >> $GITHUB_STEP_SUMMARY

  debug-matrix:
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "matrix_include: ${{ needs.plan.outputs.matrix_include }}"
          echo "shards_json:   ${{ needs.plan.outputs.shards_json }}"
          echo "max_parallel:  ${{ needs.plan.outputs.max_parallel }}"
