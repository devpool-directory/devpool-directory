name: Enforce App Author

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Delete unauthorized issue (non-App author)
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_ID: ${{ github.event.issue.node_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR: ${{ github.event.issue.user.login }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          ALLOWED_1: devpool-directory-superintendent
          ALLOWED_2: devpool-directory-superintendent[bot]
        run: |
          set -euo pipefail
          echo "author=$AUTHOR"
          if [ "$AUTHOR" = "$ALLOWED_1" ] || [ "$AUTHOR" = "$ALLOWED_2" ]; then
            echo "Author is the App; allowed."
            exit 0
          fi
          echo "Unauthorized author; deleting via GraphQL..."
          gh api graphql -f query='mutation($id:ID!){ deleteIssue(input:{issueId:$id}){ clientMutationId } }' -F id="$ISSUE_ID"
          echo "Deleted issue #$ISSUE_NUMBER (unauthorized author: $AUTHOR)"
