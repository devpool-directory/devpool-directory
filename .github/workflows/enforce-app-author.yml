name: Enforce App Author

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Delete unauthorized issue (non-App author)
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_ID: ${{ github.event.issue.node_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR: ${{ github.event.issue.user.login }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ALLOWED_1: devpool-directory-superintendent
          ALLOWED_2: devpool-directory-superintendent[bot]
        run: |
          set -euo pipefail
          echo "author=$AUTHOR"
          if [ "$AUTHOR" = "$ALLOWED_1" ] || [ "$AUTHOR" = "$ALLOWED_2" ]; then
            echo "Author is the App; allowed."
            exit 0
          fi
          echo "Unauthorized author; attempting delete via GraphQL..."
          if [ -n "${GH_TOKEN:-}" ]; then
            if gh api graphql -f query='mutation($id:ID!){ deleteIssue(input:{issueId:$id}){ clientMutationId } }' -F id="$ISSUE_ID" >/dev/null 2>&1; then
              echo "Deleted issue #$ISSUE_NUMBER (unauthorized author: $AUTHOR)"
              exit 0
            fi
          fi
          echo "Delete failed or PAT unavailable; closing instead."
          gh api -X PATCH repos/$OWNER/$REPO/issues/$ISSUE_NUMBER -f state=closed >/dev/null 2>&1 || true
          echo "Closed issue #$ISSUE_NUMBER (unauthorized author: $AUTHOR)"

