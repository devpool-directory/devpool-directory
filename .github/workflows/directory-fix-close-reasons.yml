name: Directory Fix Close Reasons

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview only (no writes)
        type: choice
        options: ["false", "true"]
        default: "false"

permissions:
  contents: read
  issues: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Configure tokens
        run: |
          echo "GITHUB_TOKEN=${{ steps.app_token.outputs.token }}" >> $GITHUB_ENV
          echo "READ_TOKEN=${{ secrets.GH_TOKEN }}" >> $GITHUB_ENV

      - name: Fix close reasons (live)
        if: ${{ inputs.dry_run == 'false' }}
        run: bash .github/scripts/fix-close-reasons.sh

      - name: Dry run summary
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "Dry run selected — no changes made."

